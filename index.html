<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js + Sketchfab — Joker (Persona 5 Strikers)</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: system-ui, sans-serif;
      color: #eee;
    }
    #info {
      position: fixed;
      top: 12px;
      left: 12px;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.55);
      border-radius: 6px;
      font-size: 13px;
      pointer-events: none;
      z-index: 10;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      font-size: 16px;
      z-index: 20;
      transition: opacity 0.4s ease;
    }
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="info">
    Arraste: rotacionar &middot; Scroll: zoom &middot; Botão direito: pan
  </div>
  <div id="loading">Carregando modelo…</div>
  <script type="module" src="./main.js"></script>
</body>
</html>
